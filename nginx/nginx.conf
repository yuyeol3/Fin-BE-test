events {
    worker_connections 1024;
}

http {
    # 1. HTTP (80포트) 요청을 HTTPS (443포트)로 강제 리다이렉트
    server {
        listen 80;
        server_name test-fin.duckdns.org;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS (443포트) 설정 및 백엔드 프록시
    server {
        listen 443 ssl;
        server_name 내도메인.duckdns.org;

        # 서버(호스트)에 저장된 인증서 경로를 매핑
        ssl_certificate /etc/letsencrypt/live/test-fin.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test-fin.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://backend:8080; # 도커 네트워크 내부의 backend 컨테이너로 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}